<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back Recovery Tracker</title>
<style>
:root {
  --bg: #002b36;
  --surface: #073642;
  --surface2: #00212b;
  --border: #0a4050;
  --text: #93a1a1;
  --text2: #839496;
  --text3: #657b83;
  --accent: #268bd2;
  --accent2: #1a6da0;
  --green: #859900;
  --yellow: #b58900;
  --red: #dc322f;
  --orange: #cb4b16;
  --cyan: #2aa198;
  --violet: #6c71c4;
  --magenta: #d33682;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 720px; margin: 0 auto; padding: 16px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 16px; }

.sync-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: 0.85rem;
}
.sync-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text3);
}
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.sync-text { flex: 1; color: var(--text2); }
.sync-btn-inline {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  transition: background 0.2s;
}
.sync-btn-inline:hover { background: var(--accent2); }

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 8px;
}
.tab {
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text2);
  transition: all 0.2s;
  white-space: nowrap;
  font-size: 0.9rem;
}
.tab:hover { background: var(--surface2); }
.tab.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.subtabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.subtab {
  padding: 8px 12px;
  background: transparent;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.85rem;
  transition: color 0.2s;
}
.subtab:hover { color: var(--text); }
.subtab.active {
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  margin-bottom: -8px;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  margin-bottom: 6px;
  color: var(--text);
  font-weight: 500;
  font-size: 0.9rem;
}
input[type="text"],
input[type="date"],
input[type="number"],
select,
textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: inherit;
}
input[type="text"]:focus,
input[type="date"]:focus,
input[type="number"]:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface2);
}

.pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill {
  padding: 8px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
  font-size: 0.85rem;
  font-weight: 500;
}
.pill:hover { border-color: var(--accent); }
.pill.selected {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.pill.green { background: var(--green); color: var(--bg); border-color: var(--green); }
.pill.yellow { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }
.pill.red { background: var(--red); color: var(--bg); border-color: var(--red); }

.slider-group {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider-group input[type="range"] {
  flex: 1;
  height: 6px;
  background: var(--surface);
  border: none;
  border-radius: 3px;
  outline: none;
  -webkit-appearance: none;
}
.slider-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.slider-group input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}
.slider-value {
  min-width: 40px;
  text-align: center;
  font-weight: 600;
  color: var(--accent);
}

.checkboxes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.checkbox-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}
.checkbox-item label {
  margin: 0;
  cursor: pointer;
  font-weight: normal;
}

.exercise-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
}
.exercise-block-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.exercise-block-title {
  font-weight: 600;
  color: var(--text);
}
.exercise-remove-btn {
  background: var(--red);
  color: var(--bg);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1.2rem;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.exercise-remove-btn:hover { background: #b82828; }

.dose-fields-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}
.dose-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.dose-field label {
  font-size: 0.8rem;
  color: var(--text2);
  margin: 0;
}
.dose-field input[type="number"],
.dose-field select {
  padding: 8px;
  font-size: 0.85rem;
}

button {
  padding: 12px 20px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.95rem;
  transition: background 0.2s;
}
button:hover { background: var(--accent2); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.alert {
  padding: 12px 16px;
  border-radius: 6px;
  margin-bottom: 12px;
  font-size: 0.9rem;
}
.alert.error { background: rgba(220, 50, 47, 0.2); color: #ff6b6b; }
.alert.success { background: rgba(133, 153, 0, 0.2); color: #b8e500; }
.alert.info { background: rgba(38, 139, 210, 0.2); color: #a0d8ff; }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  color: var(--text);
  padding: 14px 20px;
  border-radius: 6px;
  border: 1px solid var(--border);
  z-index: 1000;
  animation: slideUp 0.3s ease-out;
}
.toast.error { border-color: var(--red); }
@keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

.history-entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 12px;
}
.history-date {
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 4px;
}
.history-content {
  color: var(--text2);
  font-size: 0.9rem;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-header {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}
.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.status {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.8rem;
  font-weight: 600;
}
.status.normal { background: rgba(133, 153, 0, 0.3); color: var(--green); }
.status.mild { background: rgba(181, 137, 0, 0.3); color: var(--yellow); }
.status.moderate { background: rgba(203, 75, 22, 0.3); color: var(--orange); }
.status.severe { background: rgba(220, 50, 47, 0.3); color: var(--red); }

@media (max-width: 720px) {
  .app { padding: 12px; }
  .tabs { gap: 6px; }
  .dose-fields-grid {
    grid-template-columns: 1fr;
  }
  .checkboxes {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="app">
<h1>Back Recovery Tracker</h1>
<p class="subtitle">Tracking pain, progressions, and recovery patterns</p>

<div class="sync-bar">
  <div class="sync-dot synced" id="sync-dot"></div>
  <div class="sync-text" id="sync-text">Cloud sync not configured</div>
  <button class="sync-btn-inline" onclick="toggleSyncSetup()">Setup</button>
  <button class="sync-btn-inline" id="disconnect-btn" style="display:none; background: var(--red);" onclick="disconnectSync()">Disconnect</button>
</div>

<div id="sync-setup" style="display:none; margin-bottom:20px;">
  <div class="form-group">
    <label>JSONBin.io API Key</label>
    <input type="text" id="sync-api-key" placeholder="Enter your API key">
  </div>
  <div class="form-group">
    <label>Bin ID</label>
    <input type="text" id="sync-bin-id" placeholder="Enter your bin ID">
  </div>
  <button onclick="connectSync()" style="width:100%;">Connect Cloud Sync</button>
  <div id="sync-status-msg" style="margin-top:12px;"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(event, 'new-entry')">New Entry</button>
  <button class="tab" onclick="switchTab(event, 'history')">History</button>
  <button class="tab" onclick="switchTab(event, 'routines')">Routines</button>
  <button class="tab" onclick="switchTab(event, 'progressions')">Progressions</button>
  <button class="tab" onclick="switchTab(event, 'trends')">Trends</button>
  <button class="tab" onclick="switchTab(event, 'settings')">Settings</button>
</div>

<!-- NEW ENTRY TAB: Log Session / Next-Day Check -->
<div id="new-entry" class="tab-content active">
  <div class="subtabs">
    <button class="subtab active" onclick="switchSubTab(event, 'log-session')">Log Session</button>
    <button class="subtab" onclick="switchSubTab(event, 'next-day-check')">Next-Day Check</button>
  </div>

  <!-- LOG SESSION -->
  <div id="log-session" class="tab-content active">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="session-date">
    </div>

    <!-- BASELINE SECTION -->
    <div style="background: var(--surface2); padding: 16px; border-radius: var(--radius); margin-bottom: 16px;">
      <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">Baseline (Session Start)</div>

      <div class="form-group">
        <label>Pain Level</label>
        <div class="slider-group">
          <input type="range" id="baseline-pain" min="0" max="10" value="0" onchange="updateSliderDisplay('baseline-pain')">
          <span class="slider-value" id="baseline-pain-value">0</span>
        </div>
      </div>

      <div class="form-group">
        <label>Stiffness Level</label>
        <div class="slider-group">
          <input type="range" id="baseline-stiffness" min="0" max="10" value="0" onchange="updateSliderDisplay('baseline-stiffness')">
          <span class="slider-value" id="baseline-stiffness-value">0</span>
        </div>
      </div>

      <div class="form-group">
        <label>Pain Location(s)</label>
        <div class="checkboxes">
          <div class="checkbox-item"><input type="checkbox" name="location" value="Center low back"> <label>Center low back</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Left SI"> <label>Left SI</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Right SI"> <label>Right SI</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Left glute"> <label>Left glute</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Right glute"> <label>Right glute</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Left hamstring"> <label>Left hamstring</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Right hamstring"> <label>Right hamstring</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Left leg (sciatic)"> <label>Left leg (sciatic)</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Right leg (sciatic)"> <label>Right leg (sciatic)</label></div>
          <div class="checkbox-item"><input type="checkbox" name="location" value="Hip flexor"> <label>Hip flexor</label></div>
        </div>
      </div>

      <div class="form-group">
        <label>Nerve Symptoms</label>
        <input type="text" id="baseline-nerve" placeholder="e.g., Tingling, Numbness">
      </div>

      <div class="form-group">
        <label>Mood (1-5)</label>
        <div class="slider-group">
          <input type="range" id="baseline-mood" min="1" max="5" value="3" onchange="updateSliderDisplay('baseline-mood')">
          <span class="slider-value" id="baseline-mood-value">3</span>
        </div>
      </div>

      <div class="form-group">
        <label>Stress (1-5)</label>
        <div class="slider-group">
          <input type="range" id="baseline-stress" min="1" max="5" value="3" onchange="updateSliderDisplay('baseline-stress')">
          <span class="slider-value" id="baseline-stress-value">3</span>
        </div>
      </div>

      <div class="form-group">
        <label>Sleep Quality (1-5)</label>
        <div class="slider-group">
          <input type="range" id="baseline-sleep" min="1" max="5" value="3" onchange="updateSliderDisplay('baseline-sleep')">
          <span class="slider-value" id="baseline-sleep-value">3</span>
        </div>
      </div>

      <div class="form-group">
        <label>Steps (approx)</label>
        <input type="number" id="baseline-steps" placeholder="e.g., 5000">
      </div>

      <div class="form-group">
        <label>Hours Sitting</label>
        <input type="number" id="baseline-sitting" step="0.5" placeholder="e.g., 6">
      </div>
    </div>

    <!-- LOAD ROUTINE -->
    <div class="form-group">
      <label>Load Routine (Optional)</label>
      <div style="display: flex; gap: 8px;">
        <select id="routine-select" style="flex: 1;">
          <option value="">-- Select Routine --</option>
        </select>
        <button onclick="loadRoutineIntoSession()" style="flex: 0 0 auto; min-width: 100px;">Load</button>
      </div>
    </div>

    <!-- EXERCISE LIST -->
    <div style="margin-bottom: 16px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div style="font-weight: 600; color: var(--accent);">Exercises</div>
        <button onclick="addExerciseBlock()" style="padding: 6px 12px; font-size: 0.85rem;">+ Add Exercise</button>
      </div>
      <div id="exercise-blocks-container"></div>
    </div>

    <!-- DURING & AFTER SECTION -->
    <div style="background: var(--surface2); padding: 16px; border-radius: var(--radius); margin-bottom: 16px;">
      <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">During & After</div>

      <div class="form-group">
        <label>Symptoms During</label>
        <div class="pills">
          <button class="pill" onclick="selectDuringSymptoms(event, 'Better')">Better</button>
          <button class="pill" onclick="selectDuringSymptoms(event, 'Same')">Same</button>
          <button class="pill" onclick="selectDuringSymptoms(event, 'Worse')">Worse</button>
        </div>
        <input type="hidden" id="during-symptoms">
      </div>

      <div class="form-group">
        <label>Sharp Pain During?</label>
        <div class="pills">
          <button class="pill" onclick="selectSharpPain(event, 'Yes')">Yes</button>
          <button class="pill" onclick="selectSharpPain(event, 'No')">No</button>
        </div>
        <input type="hidden" id="sharp-pain">
      </div>

      <div class="form-group">
        <label>Pain After Session (0-10)</label>
        <div class="slider-group">
          <input type="range" id="after-pain" min="0" max="10" value="0" onchange="updateSliderDisplay('after-pain')">
          <span class="slider-value" id="after-pain-value">0</span>
        </div>
      </div>

      <div class="form-group">
        <label>What Felt Best?</label>
        <textarea id="felt-best" placeholder="e.g., couch stretch calmed sciatica" rows="2"></textarea>
      </div>
    </div>

    <button onclick="saveSession()" style="width: 100%; padding: 14px;">Save Session</button>
  </div>

  <!-- NEXT-DAY CHECK -->
  <div id="next-day-check" class="tab-content">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="nextday-date">
    </div>

    <div class="form-group">
      <label>Select Previous Session</label>
      <select id="previous-session-select">
        <option value="">-- Select Session --</option>
      </select>
    </div>

    <div id="linked-session-info" style="background: var(--surface2); padding: 12px; border-radius: var(--radius); margin-bottom: 16px; display: none;">
      <div id="linked-session-content"></div>
    </div>

    <div class="form-group">
      <label>Overall Response vs Baseline</label>
      <div class="pills">
        <button class="pill" onclick="selectNDResponse(event, 'Better')">Better</button>
        <button class="pill" onclick="selectNDResponse(event, 'Same')">Same</button>
        <button class="pill" onclick="selectNDResponse(event, 'Worse')">Worse</button>
      </div>
      <input type="hidden" id="nd-response">
    </div>

    <div class="form-group">
      <label>Flare-up?</label>
      <div class="pills">
        <button class="pill" onclick="selectFlare(event, 'Yes')">Yes</button>
        <button class="pill" onclick="selectFlare(event, 'No')">No</button>
      </div>
      <input type="hidden" id="nd-flare">
    </div>

    <div class="form-group">
      <label>Likely Causes</label>
      <div class="checkboxes">
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Training dose"> <label>Training dose</label></div>
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Too much sitting"> <label>Too much sitting</label></div>
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Stress"> <label>Stress</label></div>
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Poor sleep"> <label>Poor sleep</label></div>
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Activity/lifting"> <label>Activity/lifting</label></div>
        <div class="checkbox-item"><input type="checkbox" name="nd-cause" value="Weather"> <label>Weather</label></div>
      </div>
    </div>

    <div class="form-group">
      <label>Other Causes</label>
      <textarea id="nd-cause-other" placeholder="Any other factors" rows="2"></textarea>
    </div>

    <div style="background: var(--surface2); padding: 16px; border-radius: var(--radius); margin-bottom: 16px;">
      <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">Decision</div>

      <div class="form-group">
        <label>Plan</label>
        <div class="pills">
          <button class="pill" onclick="selectPlan(event, 'Keep same')">Keep Same</button>
          <button class="pill" onclick="selectPlan(event, 'Regress')">Regress</button>
          <button class="pill" onclick="selectPlan(event, 'Progress')">Progress</button>
        </div>
        <input type="hidden" id="nd-plan">
      </div>

      <div class="form-group">
        <label>If Progressing: What Variable?</label>
        <div class="pills">
          <button class="pill" onclick="selectProgressVar(event, 'More time')">More Time</button>
          <button class="pill" onclick="selectProgressVar(event, 'More reps')">More Reps</button>
          <button class="pill" onclick="selectProgressVar(event, 'More range')">More Range</button>
          <button class="pill" onclick="selectProgressVar(event, 'More load')">More Load</button>
        </div>
        <input type="hidden" id="nd-progress-var">
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="nd-notes" placeholder="e.g., Add 10 seconds next time" rows="3"></textarea>
      </div>
    </div>

    <button onclick="saveNextDay()" style="width: 100%; padding: 14px;">Save Next-Day Check</button>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="history" class="tab-content">
  <div style="margin-bottom: 16px;">
    <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">Sessions & Next-Day Checks</div>
    <div id="history-container"></div>
  </div>
</div>

<!-- ROUTINES TAB -->
<div id="routines" class="tab-content">
  <div style="margin-bottom: 16px;">
    <button onclick="openCreateRoutineModal()" style="width: 100%; margin-bottom: 16px;">+ Create New Routine</button>
    <div id="routines-list"></div>

  date: new Date().toISOString().split('T')[0],

async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('BackRecoveryTrackerDB', DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => {
      db = req.result;
      loadSyncConfig();
      resolve();
    };
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('sessions')) {
        database.createObjectStore('sessions', { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains('nextdays')) {
        database.createObjectStore('nextdays', { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains('routines')) {
        database.createObjectStore('routines', { keyPath: 'id' });
      }
    };
  });
}

function loadSyncConfig() {
  const stored = localStorage.getItem('brt_sync');
  if (stored) {
    syncCfg = JSON.parse(stored);
    updateSyncStatus();
  }
}

function saveSyncConfig() {
  localStorage.setItem('brt_sync', JSON.stringify(syncCfg));
}

async function updateSyncStatus() {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  const disconnectBtn = document.getElementById('disconnect-btn');

  if (!syncCfg.apiKey || !syncCfg.binId) {
    dot.className = 'sync-dot';
    text.textContent = 'Cloud sync not configured';
    disconnectBtn.style.display = 'none';
  } else {
    dot.className = 'sync-dot synced';
    text.textContent = 'Cloud sync connected';
    disconnectBtn.style.display = 'block';
  }
}

function toggleSyncSetup() {
  const setupDiv = document.getElementById('sync-setup');
  setupDiv.style.display = setupDiv.style.display === 'none' ? 'block' : 'none';
}

async function connectSync() {
  const apiKey = document.getElementById('sync-api-key').value.trim();
  const binId = document.getElementById('sync-bin-id').value.trim();
  const statusMsg = document.getElementById('sync-status-msg');

  if (!apiKey || !binId) {
    statusMsg.innerHTML = '<div class="alert error">Please enter both API Key and Bin ID</div>';
    return;
  }

  try {
    statusMsg.innerHTML = '<div class="alert info">Testing connection...</div>';

    const response = await fetch(`${JSONBIN_BASE}/${binId}`, {
      headers: { 'X-Master-Key': apiKey }
    });

    if (!response.ok) {
      throw new Error('Invalid credentials or bin not found');
    }

    syncCfg = { apiKey, binId };
    saveSyncConfig();
    await updateSyncStatus();

    statusMsg.innerHTML = '<div class="alert success">Connected! Initial sync in progress...</div>';
    await syncPull();
    statusMsg.innerHTML = '<div class="alert success">Cloud sync connected and synced!</div>';
    setTimeout(() => { statusMsg.innerHTML = ''; }, 3000);
  } catch (err) {
    statusMsg.innerHTML = `<div class="alert error">Connection failed: ${err.message}</div>`;
  }
}

function disconnectSync() {
  syncCfg = { apiKey: '', binId: '' };
  localStorage.removeItem('brt_sync');
  document.getElementById('sync-api-key').value = '';
  document.getElementById('sync-bin-id').value = '';
  updateSyncStatus();
  showToast('Cloud sync disconnected');
}

async function syncPull() {
  if (!syncCfg.apiKey || !syncCfg.binId) return;

  try {
    const response = await fetch(`${JSONBIN_BASE}/${syncCfg.binId}`, {
      headers: { 'X-Master-Key': syncCfg.apiKey }
    });

    if (!response.ok) return;

    const data = await response.json();
    const record = data.record;

    if (!record) return;

    const tx = db.transaction(['sessions', 'nextdays', 'routines'], 'readwrite');

    if (record.sessions && Array.isArray(record.sessions)) {
      const store = tx.objectStore('sessions');
      for (const session of record.sessions) {
        await new Promise((resolve) => store.put(session).onsuccess = resolve);
      }
    }

    if (record.nextdays && Array.isArray(record.nextdays)) {
      const store = tx.objectStore('nextdays');
      for (const nd of record.nextdays) {
        await new Promise((resolve) => store.put(nd).onsuccess = resolve);
      }
    }

    if (record.routines && Array.isArray(record.routines)) {
      const store = tx.objectStore('routines');
      for (const routine of record.routines) {
        await new Promise((resolve) => store.put(routine).onsuccess = resolve);
      }
    }
  } catch (err) {
    console.error('Sync pull failed:', err);
  }
}

async function syncPush() {
  if (!syncCfg.apiKey || !syncCfg.binId) return;

  try {
    const sessions = await getAllFromStore('sessions');
    const nextdays = await getAllFromStore('nextdays');
    const routines = await getAllFromStore('routines');

    const data = {
      version: 2,
      sessions: sessions,
      nextdays: nextdays,
      routines: routines
    };

    await fetch(`${JSONBIN_BASE}/${syncCfg.binId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': syncCfg.apiKey
      },
      body: JSON.stringify(data)
    });
  } catch (err) {
    console.error('Sync push failed:', err);
  }
}

function getAllFromStore(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
  });
}

function putInStore(storeName, obj) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(obj);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
  });
}

function deleteFromStore(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(key);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve();
  });
}

function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function updateSliderDisplay(sliderId) {

}

function switchTab(event, tabName) {
  event.target.blur();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabName).classList.add('active');

  if (tabName === 'progressions') renderProgressions();
  if (tabName === 'trends') renderTrends();
  if (tabName === 'history') renderHistoryTab();
  if (tabName === 'routines') renderRoutinesTab();
  if (tabName === 'settings') renderSettingsTab();
}

function switchSubTab(event, subTabName) {
  const parent = event.target.parentElement;
  parent.querySelectorAll('.subtab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#new-entry .tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(subTabName).classList.add('active');

  if (subTabName === 'next-day-check') renderNDSessionSelect();
}

function removeExerciseBlock(id) {
  currentSession.exercises = currentSession.exercises.filter(ex => ex.id !== id);
  renderExerciseBlocks();
}

function renderExerciseBlocks() {
  const container = document.getElementById('exercise-blocks-container');
  container.innerHTML = currentSession.exercises.map(block => {
    const ex = EXERCISES_DB[block.exerciseId] || { name: 'Select exercise...', levels: [] };
    const levelNames = ex.levels ? ex.levels.map(l => ({ val: l.level, name: l.name })) : [];

    return `
      <div class="exercise-block">
        <div class="exercise-block-header">
          <div class="exercise-block-title">${ex.name || 'Select exercise'}</div>
          <button class="exercise-remove-btn" onclick="removeExerciseBlock('${block.id}')">×</button>
        </div>

        <div class="form-group">
          <label>Exercise</label>
          <select onchange="updateExerciseInBlock('${block.id}', this.value)">
            <option value="">-- Select Exercise --</option>
            ${EXERCISE_ORDER.map(grp => `<optgroup label="${grp.category}">${grp.exercises.filter(id => EXERCISES_DB[id]).map(id => `<option value="${id}" ${block.exerciseId === id ? 'selected' : ''}>${EXERCISES_DB[id].name}</option>`).join('')}</optgroup>`).join('')}
          </select>
        </div>

        <div class="form-group">
          <label>Level</label>
          <select onchange="updateLevelInBlock('${block.id}', this.value)">
            ${levelNames.map(l => `<option value="${l.val}" ${block.level == l.val ? 'selected' : ''}>Level ${l.val}: ${l.name}</option>`).join('')}
          </select>
        </div>

        ${block.exerciseId ? `<div class="dose-fields-grid">${renderDoseFields(block.exerciseId, block)}</div>` : ''}

        <div class="form-group">
          <label>Effort (0-10)</label>
          <div class="slider-group">
            <input type="range" min="0" max="10" value="${block.effort || 5}" oninput="updateEffortInBlock('${block.id}', this.value, this)">
            <span class="slider-value">${block.effort || 5}</span>
          </div>
        </div>

        <div class="form-group">
          <label>Range</label>
          <div class="pills">
            <button class="pill ${block.range === 'Short' ? 'selected' : ''}" onclick="updateRangeInBlock('${block.id}', 'Short')">Short</button>
            <button class="pill ${block.range === 'Medium' ? 'selected' : ''}" onclick="updateRangeInBlock('${block.id}', 'Medium')">Medium</button>
            <button class="pill ${block.range === 'Full' ? 'selected' : ''}" onclick="updateRangeInBlock('${block.id}', 'Full')">Full</button>
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea placeholder="Any notes about this exercise" onchange="updateNotesInBlock('${block.id}', this.value)" rows="2">${block.notes || ''}</textarea>
        </div>
      </div>
    `;
  }).join('');
}

function renderDoseFields(exerciseId, block) {
  const ex = EXERCISES_DB[exerciseId];
  if (!ex || !ex.doseFields) return '';

  return ex.doseFields.map(field => {
    const currentVal = block.dose[field.id] !== undefined ? block.dose[field.id] : field.default;

    if (field.type === 'number') {
      return `
        <div class="dose-field">
          <label>${field.label}</label>
          <input type="number" min="0" value="${currentVal}" onchange="updateDoseField('${block.id}', '${field.id}', this.value)">
        </div>
      `;
    } else if (field.type === 'select') {
      return `
        <div class="dose-field">
          <label>${field.label}</label>
          <select onchange="updateDoseField('${block.id}', '${field.id}', this.value)">
            ${field.options.map(opt => `<option value="${opt}" ${currentVal === opt ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>
        </div>
      `;
    } else if (field.type === 'checkbox') {
      return `
        <div class="dose-field" style="flex-direction: row; align-items: center; margin-top: 8px;">
          <label style="margin: 0;">${field.label}</label>
          <input type="checkbox" style="width: 18px; height: 18px; margin-left: 6px;" ${currentVal ? 'checked' : ''} onchange="updateDoseField('${block.id}', '${field.id}', this.checked)">
        </div>
      `;
    }
    return '';
  }).join('');
}

function updateExerciseInBlock(blockId, exerciseId) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) {
    block.exerciseId = exerciseId;
    block.dose = {};
    block.level = 1;
    renderExerciseBlocks();
  }
}

function updateLevelInBlock(blockId, level) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) block.level = parseInt(level);
}

function updateDoseField(blockId, fieldId, value) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) {
    block.dose[fieldId] = value === 'true' ? true : value === 'false' ? false : isNaN(value) ? value : (value === '' ? value : value);
  }
}

function updateEffortInBlock(blockId, value, inputEl) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) {
    block.effort = parseInt(value);
    if (inputEl) {
      const valueSpan = inputEl.nextElementSibling;
      if (valueSpan) valueSpan.textContent = value;
    }
  }
}

function updateRangeInBlock(blockId, range) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) {
    block.range = block.range === range ? '' : range;
    renderExerciseBlocks();
  }
}

function updateNotesInBlock(blockId, notes) {
  const block = currentSession.exercises.find(b => b.id === blockId);
  if (block) block.notes = notes;
}

async function saveSession() {
  const date = document.getElementById('session-date').value;
  const locations = Array.from(document.querySelectorAll('input[name="location"]:checked')).map(cb => cb.value);

  if (!date || currentSession.exercises.length === 0) {
    showToast('Please fill in date and add at least one exercise', true);
    return;
  }

  const session = {
    id: 'ses_' + date + '_' + Date.now(),
    type: 'session',
    date: date,
    baseline: {
      pain: parseInt(document.getElementById('baseline-pain').value) || 0,
      stiffness: parseInt(document.getElementById('baseline-stiffness').value) || 0,
      locations: locations,
      nerveSymptoms: document.getElementById('baseline-nerve').value,
      mood: parseInt(document.getElementById('baseline-mood').value) || 3,
      stress: parseInt(document.getElementById('baseline-stress').value) || 3,
      sleep: parseInt(document.getElementById('baseline-sleep').value) || 3,
      steps: document.getElementById('baseline-steps').value,
      sitting: document.getElementById('baseline-sitting').value
    },
    exercises: currentSession.exercises.map(ex => ({
      exerciseId: ex.exerciseId,
      name: EXERCISES_DB[ex.exerciseId]?.name || 'Unknown',
      level: parseInt(ex.level) || 1,
      dose: ex.dose,
      range: ex.range,
      effort: parseInt(ex.effort) || 0,
      notes: ex.notes
    })),
    during: {
      symptoms: document.getElementById('during-symptoms').value,
      sharpPain: document.getElementById('sharp-pain').value,
      afterPain: parseInt(document.getElementById('after-pain').value) || 0,
      feltBest: document.getElementById('felt-best').value
    }
  };

  try {
    await putInStore('sessions', session);
    currentSession = {
      date: new Date().toISOString().split('T')[0],
      baseline: { pain: 0, stiffness: 0, locations: [], nerveSymptoms: '', mood: 3, stress: 3, sleep: 3, steps: '', sitting: '' },
      exercises: [],
      during: { symptoms: '', sharpPain: '', afterPain: 0, feltBest: '' }
    };
    document.getElementById('session-date').value = currentSession.date;
    renderExerciseBlocks();
    await syncPush();
    showToast('Session saved!');
  } catch (err) {
    console.error('Failed to save session:', err);
    showToast('Failed to save', true);
  }
}

async function renderNDSessionSelect() {
  const sessions = await getAllFromStore('sessions');
  const select = document.getElementById('previous-session-select');
  select.innerHTML = '<option value="">-- Select Session --</option>' + sessions.map(s => {
    const exNames = s.exercises.map(e => e.name).join(', ');
    return `<option value="${s.id}">${s.date} - ${exNames} (Pain: ${s.baseline.pain})</option>`;
  }).join('');

  select.onchange = () => {
    const sessionId = select.value;
    if (!sessionId) {
      document.getElementById('linked-session-info').style.display = 'none';
      return;
    }
    const session = sessions.find(s => s.id === sessionId);
    if (session) {
      document.getElementById('linked-session-content').innerHTML = `
        <div style="font-size: 0.9rem;">
          <div><strong>Date:</strong> ${session.date}</div>
          <div><strong>Baseline Pain:</strong> ${session.baseline.pain}/10</div>
          <div><strong>Exercises:</strong> ${session.exercises.map(e => e.name).join(', ')}</div>
        </div>
      `;
      document.getElementById('linked-session-info').style.display = 'block';
      document.getElementById('nd-session-id').value = sessionId;
    }
  };
}

async function saveNextDay() {
  const date = document.getElementById('nextday-date').value;
  const linkedSessionId = document.getElementById('previous-session-select').value;
  const response = document.getElementById('nd-response').value;
  const flare = document.getElementById('nd-flare').value;
  const plan = document.getElementById('nd-plan').value;

  if (!date || !linkedSessionId || !response || !flare || !plan) {
    showToast('Please complete all required fields', true);
    return;
  }

  const causes = Array.from(document.querySelectorAll('input[name="nd-cause"]:checked')).map(cb => cb.value);

  const nd = {
    id: 'nd_' + date + '_' + Date.now(),
    type: 'nextday',
    date: date,
    linkedSessionId: linkedSessionId,
    vsBaseline: response,
    flare: flare,
    causes: causes,
    causeOther: document.getElementById('nd-cause-other').value,
    decision: {
      plan: plan,
      progressVar: document.getElementById('nd-progress-var').value,
      notes: document.getElementById('nd-notes').value
    }
  };

  try {
    await putInStore('nextdays', nd);
    document.getElementById('nextday-date').value = '';
    document.getElementById('previous-session-select').value = '';
    document.getElementById('nd-response').value = '';
    document.getElementById('nd-flare').value = '';
    document.getElementById('nd-plan').value = '';
    document.getElementById('nd-progress-var').value = '';
    document.getElementById('nd-notes').value = '';
    document.getElementById('nd-cause-other').value = '';
    document.querySelectorAll('input[name="nd-cause"]').forEach(cb => cb.checked = false);
    await syncPush();
    showToast('Next-day check saved!');
  } catch (err) {
    console.error('Failed to save:', err);
    showToast('Failed to save', true);
  }
}

async function renderHistoryTab() {
  const sessions = await getAllFromStore('sessions');
  const nextdays = await getAllFromStore('nextdays');

  const container = document.getElementById('history-container');
  const allEntries = [];

  sessions.forEach(s => {
    allEntries.push({
      type: 'session',
      date: s.date,
      data: s,
      sortDate: new Date(s.date).getTime()
    });
  });

  nextdays.forEach(nd => {
    allEntries.push({
      type: 'nextday',
      date: nd.date,
      data: nd,
      sortDate: new Date(nd.date).getTime()
    });
  });

  allEntries.sort((a, b) => b.sortDate - a.sortDate);

  if (allEntries.length === 0) {
    container.innerHTML = '<p style="color: var(--text2);">No sessions or next-day checks yet.</p>';
    return;
  }

  container.innerHTML = allEntries.map(entry => {
    if (entry.type === 'session') {
      const s = entry.data;
      return `
        <div class="history-entry">
          <div class="history-date">${s.date} • ${s.exercises.length} exercise(s)</div>
          <div class="history-content">
            <strong>Baseline Pain:</strong> ${s.baseline.pain}/10 | <strong>Exercises:</strong> ${s.exercises.map(e => e.name).join(', ')}
          </div>
          <div style="margin-top: 8px; display: flex; gap: 8px;">
            <button onclick="deleteSession('${s.id}')" style="flex: 1; background: var(--red); padding: 8px;">Delete</button>
          </div>
        </div>
      `;
    } else {
      const nd = entry.data;
      const statusClass = nd.vsBaseline === 'Better' ? 'normal' : nd.vsBaseline === 'Same' ? 'mild' : 'severe';
      return `
        <div class="history-entry">
          <div class="history-date">${nd.date} • Next-Day Check</div>
          <div class="history-content">
            <strong>Response:</strong> <span class="status ${statusClass}">${nd.vsBaseline}</span> | <strong>Flare:</strong> ${nd.flare} | <strong>Plan:</strong> ${nd.decision.plan}
          </div>
          <div style="margin-top: 8px; display: flex; gap: 8px;">
            <button onclick="deleteNextDay('${nd.id}')" style="flex: 1; background: var(--red); padding: 8px;">Delete</button>
          </div>
        </div>
      `;
    }
  }).join('');
}

  if (confirm('Delete this session?')) {
    await deleteFromStore('sessions', id);
    await syncPush();
    renderHistoryTab();
    showToast('Session deleted');
  }
}

    await deleteFromStore('nextdays', id);
    await syncPush();
    renderHistoryTab();
    showToast('Next-day check deleted');
  }
}

function updateModalLevelDropdown() {
  const exerciseId = document.getElementById('modal-exercise-select').value;
  const levelSelect = document.getElementById('modal-level-select');
  const doseFieds = document.getElementById('modal-dose-fields');

  levelSelect.innerHTML = '';
  doseFieds.innerHTML = '';

  if (!exerciseId) return;

  const ex = EXERCISES_DB[exerciseId];
  ex.levels.forEach(lv => {
    const option = document.createElement('option');
    option.value = lv.level;
    option.textContent = `Level ${lv.level}: ${lv.name}`;
    levelSelect.appendChild(option);
  });

  if (ex.doseFields) {
    doseFieds.innerHTML = `<div class="dose-fields-grid" style="margin-top: 12px;">${ex.doseFields.map(field => {
      if (field.type === 'number') {
        return `<div class="dose-field"><label>${field.label}</label><input type="number" id="modal-dose-${field.id}" value="${field.default}"></div>`;
      } else if (field.type === 'select') {
        return `<div class="dose-field"><label>${field.label}</label><select id="modal-dose-${field.id}"><option value="">${field.options[0]}</option>${field.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select></div>`;
      } else if (field.type === 'checkbox') {
        return `<div class="dose-field" style="flex-direction: row; align-items: center;"><label>${field.label}</label><input type="checkbox" id="modal-dose-${field.id}" ${field.default ? 'checked' : ''}></div>`;
      }
    }).join('')}</div>`;
  }
}

function addRoutineExercise() {
  const exerciseId = document.getElementById('modal-exercise-select').value;
  const level = document.getElementById('modal-level-select').value;

  if (!exerciseId || !level) {
    showToast('Please select exercise and level', true);
    return;
  }

  const dose = {};
  const ex = EXERCISES_DB[exerciseId];
  if (ex.doseFields) {
    ex.doseFields.forEach(field => {
      const val = document.getElementById(`modal-dose-${field.id}`)?.value;
      if (val !== undefined && val !== '') dose[field.id] = val;
    });
  }

  currentRoutineExercises.push({ exerciseId, level: parseInt(level), dose });
  closeRoutineExerciseModal();
  renderRoutineExercisesList();
}

function removeFromRoutineExercises(idx) {
  currentRoutineExercises.splice(idx, 1);
  renderRoutineExercisesList();
}

async function saveRoutine() {
  const name = document.getElementById('routine-name').value.trim();

  if (!name || currentRoutineExercises.length === 0) {
    showToast('Please enter name and add exercises', true);
    return;
  }

  const routine = {
    id: 'routine_' + Date.now(),
    name: name,
    exercises: currentRoutineExercises
  };

  try {
    await putInStore('routines', routine);
    closeRoutineModal();
    currentRoutineExercises = [];
    await syncPush();
    showToast('Routine saved!');
    renderRoutinesTab();
  } catch (err) {
    showToast('Failed to save', true);
  }
}

async function loadRoutineIntoSession() {
  const routineId = document.getElementById('routine-select').value;
  if (!routineId) {
    showToast('Please select a routine', true);
    return;
  }

  const routines = await getAllFromStore('routines');
  const routine = routines.find(r => r.id === routineId);
  if (!routine) return;

  routine.exercises.forEach(ex => {
    currentSession.exercises.push({
      id: 'ex_' + Date.now() + Math.random(),
      exerciseId: ex.exerciseId,
      level: ex.level,
      dose: ex.dose || {},
      range: '',
      effort: 5,
      notes: ''
    });
  });

  renderExerciseBlocks();
  showToast('Routine loaded!');
}

        <strong>Exercises:</strong> ${r.exercises.map(e => EXERCISES_DB[e.exerciseId]?.name || 'Unknown').join(', ')}
      </div>
      <div style="margin-top: 8px; display: flex; gap: 8px;">
        <button onclick="deleteRoutine('${r.id}')" style="flex: 1; background: var(--red); padding: 8px;">Delete</button>
      </div>
    </div>
  `).join('');

  const select = document.getElementById('routine-select');
  select.innerHTML = '<option value="">-- Select Routine --</option>' + routines.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

async function deleteRoutine(id) {
  if (confirm('Delete this routine?')) {
    await deleteFromStore('routines', id);
    await syncPush();
    renderRoutinesTab();
    showToast('Routine deleted');
  }
}

async function renderProgressions() {
  const container = document.getElementById('progressions-container');
  const orderedExercises = [];
  EXERCISE_ORDER.forEach(grp => {
    orderedExercises.push({ isCategory: true, category: grp.category });
    grp.exercises.forEach(id => { if (EXERCISES_DB[id]) orderedExercises.push({ id, ex: EXERCISES_DB[id] }); });
  });
  container.innerHTML = orderedExercises.map(item => {
    if (item.isCategory) return `<div style="margin-top: 16px; margin-bottom: 8px; font-weight: 700; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px;">${item.category}</div>`;
    const id = item.id, ex = item.ex;
    const currentLevel = localStorage.getItem(`level_${id}`) ? parseInt(localStorage.getItem(`level_${id}`)) : 1;
    return `
      <div class="history-entry">
        <div class="history-date" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'; this.style.cursor = 'pointer';">
          ${ex.name} • Level ${currentLevel} ▼
        </div>
        <div style="display: none; padding-top: 12px;">
          ${ex.levels.map(lv => `
            <div style="margin-bottom: 12px; padding: 8px; background: var(--surface2); border-radius: 6px;">
              <div style="font-weight: 600; margin-bottom: 4px;">Level ${lv.level}: ${lv.name}</div>
              <div style="font-size: 0.85rem; color: var(--text2); margin-bottom: 4px;">${lv.description}</div>
              <div style="font-size: 0.85rem; color: var(--accent);">Goal: ${lv.goal}</div>
              <button onclick="setLevel('${id}', ${lv.level})" style="margin-top: 8px; width: 100%; ${currentLevel === lv.level ? 'background: var(--green);' : ''}">
                ${currentLevel === lv.level ? 'Current Level' : 'Set Level'}
              </button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function setLevel(exerciseId, level) {
  localStorage.setItem(`level_${exerciseId}`, level);
  renderProgressions();
  showToast(`${EXERCISES_DB[exerciseId].name} set to Level ${level}`);
}

async function renderTrends() {
  const sessions = await getAllFromStore('sessions');
  const container = document.getElementById('trends-container');

  if (sessions.length === 0) {
    container.innerHTML = '<p style="color: var(--text2);">No session data yet.</p>';
    return;
  }

  const painByDate = {};
  sessions.forEach(s => {
    if (!painByDate[s.date]) painByDate[s.date] = [];
    painByDate[s.date].push(s.baseline.pain);
  });

  const avgPainByDate = Object.entries(painByDate).map(([date, pains]) => ({
    date,
    avg: (pains.reduce((a, b) => a + b, 0) / pains.length).toFixed(1)
  })).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(-30);

  container.innerHTML = `
    <div style="margin-bottom: 16px;">
      <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">Baseline Pain Trend (Last 30 Days)</div>
      <div style="background: var(--surface); padding: 16px; border-radius: var(--radius); overflow-x: auto;">
        <table style="width: 100%; font-size: 0.85rem;">
          <thead><tr><th style="text-align: left;">Date</th><th style="text-align: right;">Avg Pain</th></tr></thead>
          <tbody>
            ${avgPainByDate.map(({date, avg}) => `<tr><td>${date}</td><td style="text-align: right;">${avg}/10</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div>
      <div style="font-weight: 600; color: var(--accent); margin-bottom: 12px;">Sessions Summary</div>
      <div style="background: var(--surface); padding: 16px; border-radius: var(--radius); font-size: 0.9rem;">
        <div><strong>Total Sessions:</strong> ${sessions.length}</div>
        <div><strong>Avg Baseline Pain:</strong> ${(sessions.reduce((a, s) => a + s.baseline.pain, 0) / sessions.length).toFixed(1)}/10</div>
      </div>
    </div>
  `;
}

  // Already in HTML, just ensure it's populated
}

async function exportData() {
  const sessions = await getAllFromStore('sessions');
  const nextdays = await getAllFromStore('nextdays');
  const routines = await getAllFromStore('routines');

  const data = { sessions, nextdays, routines, exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'brt-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  showToast('Data exported');
}

function importData() {
  const input = document.getElementById('import-file');
  input.click();
  input.onchange = async () => {
    const file = input.files[0];
    const text = await file.text();
    const data = JSON.parse(text);

    try {
      if (data.sessions && Array.isArray(data.sessions)) {
        for (const s of data.sessions) await putInStore('sessions', s);
      }
      if (data.nextdays && Array.isArray(data.nextdays)) {
        for (const nd of data.nextdays) await putInStore('nextdays', nd);
      }
      if (data.routines && Array.isArray(data.routines)) {
        for (const r of data.routines) await putInStore('routines', r);
      }
      await syncPush();
      showToast('Data imported successfully!');
    } catch (err) {
      showToast('Import failed: ' + err.message, true);
    }
  };
}

async function clearAllData() {
  if (confirm('Are you sure? This will delete ALL sessions, next-day checks, and routines.')) {
    if (confirm('This action cannot be undone. Are you really sure?')) {
      const sessions = await getAllFromStore('sessions');
      const nextdays = await getAllFromStore('nextdays');
      const routines = await getAllFromStore('routines');

      for (const s of sessions) await deleteFromStore('sessions', s.id);
      for (const nd of nextdays) await deleteFromStore('nextdays', nd.id);
      for (const r of routines) await deleteFromStore('routines', r.id);

      await syncPush();
      showToast('All data cleared');
    }
  }
}
